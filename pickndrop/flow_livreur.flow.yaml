  events:
    - name: package_assigned
      payload:
        - package_id
        - deliverer_id
        - assigned_at
      subscribers:
        - notification_service
        - analytics_service
        - sender_email_notification
    - name: package_picked_up
      payload:
        - package_id
        - deliverer_id
        - relay_point_id
        - picked_up_at
      subscribers:
        - notification_service
        - tracking_service
        - sender_push_notification
    - name: package_in_transit
      payload:
        - package_id
        - current_location
        - eta_minutes
      subscribers:
        - tracking_service
        - recipient_notification_when_close
    - name: package_delivered
      payload:
        - package_id
        - deliverer_id
        - delivered_at
        - proof_url
      subscribers:
        - notification_service
        - billing_service
        - satisfaction_survey_scheduler
        - analytics_service
    - name: delivery_failed
      payload:
        - package_id
        - attempt_number
        - failure_reason
        - next_attempt_at
      subscribers:
        - notification_service
        - customer_service_alert
        - analytics_service
    - name: package_returned
      payload:
        - package_id
        - return_reason
        - returned_at
      subscribers:
        - sender_notification
        - billing_service
        - analytics_service
    - name: package_damaged
      payload:
        - package_id
        - damage_type
        - severity
        - reported_by
      subscribers:
        - insurance_service
        - customer_service
        - sender_notification
  notifications:
    templates:
      - id: package_assigned_deliverer
        channel:
          - PUSH
          - EMAIL
        recipient: deliverer
        title: Nouveau colis assigné
        body: Vous avez un nouveau colis à récupérer {{tracking_number}}
      - id: package_picked_up_sender
        channel:
          - PUSH
          - SMS
        recipient: sender
        title: Colis récupéré
        body: Votre colis {{tracking_number}} a été récupéré par le livreur
      - id: package_arriving_soon_recipient
        channel:
          - PUSH
          - SMS
        recipient: recipient
        title: Livraison imminente
        body: Votre colis arrive dans environ {{eta_minutes}} minutes
        trigger_condition: eta_minutes_less_than_15
      - id: package_delivered_recipient
        channel:
          - PUSH
          - SMS
          - EMAIL
        recipient: recipient
        title: Colis livré
        body: Votre colis {{tracking_number}} a été livré avec succès
      - id: delivery_failed_recipient
        channel:
          - PUSH
          - SMS
        recipient: recipient
        title: Tentative de livraison échouée
        body: Nous n avons pas pu vous livrer Tentative {{attempt_number}} sur 3
      - id: package_at_relay_recipient
        channel:
          - PUSH
          - SMS
          - EMAIL
        recipient: recipient
        title: Colis disponible au point relais
        body: Votre colis est disponible au point relais {{relay_name}} jusqu au {{expiry_date}}
      - id: package_damaged_sender
        channel:
          - PUSH
          - EMAIL
        recipient: sender
        title: Colis endommagé signalé
        body: Un dommage a été signalé sur votre colis {{tracking_number}}
      - id: package_returned_sender
        channel:
          - PUSH
          - EMAIL
        recipient: sender
        title: Colis retourné
        body: Votre colis {{tracking_number}} a été retourné
  metrics:
    kpis:
      - name: delivery_success_rate
        formula: successful_deliveries_divided_by_total_attempts_times_100
        target: 95_percent
        alert_threshold: 90_percent
      - name: average_delivery_time
        formula: avg_delivered_at_minus_picked_up_at
        target: less_than_2_hours
        alert_threshold: more_than_4_hours
      - name: first_attempt_success_rate
        formula: first_attempt_success_divided_by_total_deliveries_times_100
        target: 85_percent
      - name: deliverer_utilization
        formula: active_delivery_time_divided_by_total_online_time_times_100
        target: 70_percent
      - name: customer_satisfaction
        formula: avg_satisfaction_score
        target: 4_5_out_of_5
      - name: cancellation_rate
        formula: cancelled_assignments_divided_by_total_assignments_times_100
        target: less_than_5_percent
      - name: damage_report_rate
        formula: damaged_packages_divided_by_total_packages_times_100
        target: less_than_1_percent
    dashboards:
      - name: deliverer_performance
        widgets:
          - deliveries_today
          - success_rate_trend
          - earnings_chart
          - ranking_position
      - name: operations_overview
        widgets:
          - packages_in_transit
          - failed_deliveries_requiring_action
          - deliverer_availability_map
          - sla_compliance
  business_rules:
    assignment:
      max_simultaneous_packages: 10
      auto_release_timeout_hours: 4
      cancellation_penalty_after: 3
      suspension_after_cancellations: 10
    delivery:
      max_attempts: 3
      min_hours_between_attempts: 24
      proximity_verification_meters: 500
      photo_proof_required: true
      signature_required_above_value: 100
    returns:
      auto_return_after_failed_attempts: true
      return_fee_percentage: 50
      max_days_at_relay_before_return: 14
    ratings:
      min_deliveries_for_rating: 10
      reliability_score_factors:
        on_time_delivery: 40
        success_rate: 30
        customer_ratings: 20
        cancellation_rate: 10
  security:
    rate_limiting:
      get_packages: 30_per_minute
      assign_package: 10_per_minute
      update_location: 60_per_minute
      upload_proof: 5_per_minute
    data_masking:
      - field: recipient_phone
        condition: deliverer_not_assigned
        mask: hidden
      - field: sender_phone
        condition: deliverer_not_assigned
        mask: hidden
    audit_logging:
      enabled: true
      events:
        - package_status_change
        - assignment_change
        - delivery_proof_upload
        - failed_delivery_attempt
        - damage_report
        - return_initiated
